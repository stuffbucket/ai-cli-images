name: packages-ci

# Tests the npm packages and verifies the per-CLI wrappers stay in sync with
# versions.json (the 1:1 version contract). Image publishing lives in build.yml.
on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "scripts/**"
      - "versions.json"
      - "package.json"
      - ".github/workflows/packages-ci.yml"
  pull_request:
    paths:
      - "packages/**"
      - "scripts/**"
      - "versions.json"
      - "package.json"
      - ".github/workflows/packages-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Wrappers are in sync with versions.json (1:1)
        run: |
          node scripts/gen-clis.mjs
          git diff --exit-code packages/clis \
            || { echo "::error::packages/clis is stale — run 'npm run gen' and commit"; exit 1; }
