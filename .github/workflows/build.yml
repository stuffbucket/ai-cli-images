name: build-and-push

# Builds each CLI image (multi-arch) and pushes it to the GitHub Container
# Registry. The image set and pinned CLI versions come from versions.json.
on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "versions.json"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "images/**"
      - "versions.json"
      - ".github/workflows/build.yml"
  schedule:
    # Weekly rebuild to pick up base-image security updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      # Third-party actions are pinned to a commit SHA (not a movable tag) to
      # defend against tag-hijack / supply-chain attacks; the trailing comment
      # records the human-readable version.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: set
        # Turn versions.json {"name":{"version","base"},...} into a build matrix.
        run: |
          matrix="$(jq -c '{include: [to_entries[] | {name: .key, version: .value.version, base: .value.base}]}' versions.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          # Base variant (alpine/slim) is encoded as a tag suffix, matching the
          # convention of the official node/python images. With one base per
          # image today, the unsuffixed `latest`/`<version>` and the floating
          # `<base>` tag all point at the same build; the suffixed
          # `<version>-<base>` is the fully explicit, reproducible pin.
          tags: |
            type=raw,value=${{ matrix.version }}-${{ matrix.base }}
            type=raw,value=${{ matrix.version }}
            type=raw,value=${{ matrix.base }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ matrix.version }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: images/${{ matrix.name }}
          build-args: |
            CLI_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          # Push on branch/schedule/dispatch; build-only for pull requests.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Supply-chain attestations: signed SLSA provenance + an SBOM per image.
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
