name: build-and-push

# Builds each CLI image (multi-arch) and pushes it to the GitHub Container
# Registry. The image set and pinned CLI versions come from versions.json.
on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "versions.json"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "images/**"
      - "versions.json"
      - ".github/workflows/build.yml"
  schedule:
    # Weekly rebuild to pick up base-image security updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      # Third-party actions are pinned to a commit SHA (not a movable tag) to
      # defend against tag-hijack / supply-chain attacks; the trailing comment
      # records the human-readable version.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: set
        # Turn versions.json {"name":{"version","base"},...} into a build matrix.
        run: |
          matrix="$(jq -c '{include: [to_entries[] | {name: .key, version: .value.version, base: .value.base}]}' versions.json)"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          # Base variant (alpine/slim) is encoded as a tag suffix, matching the
          # convention of the official node/python images. With one base per
          # image today, the unsuffixed `latest`/`<version>` and the floating
          # `<base>` tag all point at the same build; the suffixed
          # `<version>-<base>` is the fully explicit, reproducible pin.
          tags: |
            type=raw,value=${{ matrix.version }}-${{ matrix.base }}
            type=raw,value=${{ matrix.version }}
            type=raw,value=${{ matrix.base }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.version=${{ matrix.version }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: images/${{ matrix.name }}
          build-args: |
            CLI_VERSION=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          # Push on branch/schedule/dispatch; build-only for pull requests.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Supply-chain attestations: signed SLSA provenance + an SBOM per image.
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # Publish the npx wrappers in lockstep with the images, so the npm package
  # version === the CLI version === the image tag (1:1). Runs after the images
  # are pushed; only publishes versions not already on npm (idempotent).
  publish-npm:
    needs: [prepare, build]
    # Flip the repo variable NPM_PUBLISH=true once Trusted Publishing is linked on
    # npmjs for each package — until then this job is skipped so the build stays
    # green (no token to mask, no premature 404s).
    if: ${{ github.event_name != 'pull_request' && vars.NPM_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC trusted publishing — no NPM_TOKEN. The runner exchanges a GitHub
      # OIDC token for npm publish auth; requires Trusted Publishing to be linked
      # on npmjs for each package (owner stuffbucket / repo ai-cli-images /
      # workflow build.yml). Provenance attestations are produced automatically.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # OIDC token-exchange auth needs npm >= 11.5.1 (node 24 may ship an older
      # 11.x; provenance would sign but the publish PUT would 404 without this).
      - name: Ensure npm supports OIDC publishing
        run: npm install -g npm@latest && npm --version
      - name: Generate version-synced wrappers from versions.json
        run: node scripts/gen-clis.mjs
      - name: Publish changed packages (OIDC trusted publishing)
        run: |
          set -eu
          publish_if_new() {
            d="$1"
            name="$(jq -r .name "$d/package.json")"
            ver="$(jq -r .version "$d/package.json")"
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "$name@$ver already on npm — skip"
            else
              echo "publishing $name@$ver"
              ( cd "$d" && npm publish --access public )
            fi
          }
          # core first (the wrappers depend on it), then the wrappers, then the proxy.
          publish_if_new packages/core
          for d in packages/clis/*; do publish_if_new "$d"; done
          publish_if_new packages/key-proxy
